<!DOCTYPE html>
<html lang="en" data-textdirection="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BullRun V3 - Global ETH Autopool</title>
    <meta name="description" content="BullRun V3 - Real One Line Global Autopool to earn 300+ ETH">
    
    <!-- Favicon -->
    <link rel="shortcut icon" type="image/x-icon" href="https://1dapp.github.io/signup/assets/img/bullrun3.png">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Comfortaa:300,400,500,700" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://1dapp.github.io/signup/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://1dapp.github.io/signup/assets/css/style.min.css">
    <link rel="stylesheet" href="https://1dapp.github.io/signup/assets/css/animate.min.css">
    
    <!-- Custom CSS -->
    <style>
        /* Thêm các style tối ưu cho mobile */
        @media (max-width: 768px) {
            .banner-content {
                padding: 1rem;
            }
            .btn {
                width: 100%;
                margin: 5px 0;
            }
            .social-links {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <!-- Preloader -->
    <div id="loader-wrapper">
        <!-- Giữ nguyên preloader -->
    </div>

    <!-- Social Media Links - Đã sửa liên kết -->
    <nav class="vertical-social">
        <ul>
            <li><a href="https://twitter.com/BullRunV3" target="_blank" rel="noopener noreferrer"><i class="fab fa-twitter"></i></a></li>
            <li><a href="https://t.me/BullRunV3" target="_blank" rel="noopener noreferrer"><i class="fab fa-telegram"></i></a></li>
            <li><a href="https://www.facebook.com/nguyenphunho66668888" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook"></i></a></li>
        </ul>
    </nav>

    <!-- Header Section -->
    <header class="page-header">
        <!-- Giữ nguyên header -->
    </header>

    <!-- Main Content - Đã tối ưu responsive -->
    <div class="content-wrapper">
        <div class="content-body">
            <main>
                <!-- Các section chính giữ nguyên -->
                <!-- Đảm bảo tất cả hình ảnh có alt text -->
                <img src="https://1dapp.github.io/signup/assets/img/bullrun3.png" alt="BullRun V3 Logo" class="crypto-logo-img img-fluid">
                
                <!-- Các nút đăng ký/đăng nhập -->
                <div class="purchase-token-btn text-center m-b-10">
                    <a href="https://bullrunv3.github.io/signup" class="btn btn-lg btn-gradient-orange btn-round btn-glow">Register</a>
                    <a href="https://bullrunv3.github.io/signin" class="btn btn-lg btn-gradient-orange btn-round btn-glow ml-4">Log in</a>
                </div>
            </main>
        </div>
    </div>

    <!-- Footer - Đã sửa liên kết và tối ưu -->
    <footer class="footer static-bottom footer-dark footer-custom-class">
        <div class="container">
            <div class="footer-wrapper mx-auto text-center">
                <ul class="social-buttons list-unstyled mb-5">
                    <li><a href="https://www.facebook.com/nguyenphunho66668888" target="_blank" rel="noopener noreferrer" class="btn btn-outline-facebook rounded-circle"><i class="fab fa-facebook-f"></i></a></li>
                    <li><a href="https://twitter.com/BullRunV3" target="_blank" rel="noopener noreferrer" class="btn btn-outline-twitter rounded-circle"><i class="fab fa-twitter"></i></a></li>
                    <li><a href="https://t.me/BullRunV3" target="_blank" rel="noopener noreferrer" class="btn btn-outline-telegram rounded-circle"><i class="fab fa-telegram"></i></a></li>
                </ul>
                
                <div class="w-full text-center mt-3">
                    <p class="text-white">Contract address</p>
                    <a href="https://etherscan.io/address/0x924a99087196f4b23e312ae6110218e54e0dbb51" style="word-break: break-all;" class="txt3" target="_blank" rel="noopener noreferrer">
                        0x924a99087196f4b23e312ae6110218e54e0dbb51 <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://1dapp.github.io/vendors.min.js"></script>
    <script src="https://1dapp.github.io/theme.js"></script>
    
    <!-- Script tùy chỉnh -->
    <script>
        // Xử lý sự kiện khi trang tải xong
        document.addEventListener("DOMContentLoaded", function() {
            // Ẩn preloader
            setTimeout(function() {
                document.getElementById('loader-wrapper').style.display = 'none';
            }, 1000);
            
            // Thêm hiệu ứng scroll mượt
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });
        });
    </script>
</body>
</html>
