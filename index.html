<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Phú Nhờ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--light-color);
            color: var(--dark-color);
            line-height: 1.6;
        }
        
        header {
            background-color: var(--secondary-color);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 0;
        }
        
        section {
            margin-bottom: 3rem;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        h1, h2, h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
        }
        
        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #2980b9;
            transform: translateY(-3px);
        }
        
        footer {
            text-align: center;
            padding: 2rem 0;
            background: var(--secondary-color);
            color: white;
        }
        
        @media (max-width: 768px) {
            .container {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>All in all</h1>
            <p>Chào mừng bạn đến với trang web chính thức của tôi</p>
        </div>
    </header>

    <main class="container">
        <section id="about">
            <h2>Giới thiệu</h2>
            <p>Xin chào! Tôi là Nguyễn Phú Nhờ. Đây là trang web chính thức của tôi.</p>
        </section>

        <section id="projects">
            <h2>Dự án</h2>
            <div class="project-list">
                <!-- Thêm các dự án của bạn ở đây -->
            </div>
        </section>

        <section id="contact">
            <h2>Liên hệ</h2>
            <p>Email: nguyenphunho@email.com</p>
            <div class="social-links">
                <a href="#" class="btn"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="#" class="btn"><i class="fab fa-github"></i> GitHub</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 all in one. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // JavaScript sẽ thêm hiệu ứng sau khi trang tải xong
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Trang web đã sẵn sàng!');
            
            // Thêm hiệu ứng scroll mượt mà
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });
        });
    </script>
</body>
</html>
